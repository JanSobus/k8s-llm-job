# Reference manifest only: the FastAPI app builds runnable Jobs programmatically
# (see backend/app/k8s_jobs.py) and injects MinIO/provider APP_* environment.
# To run this manifest manually, mirror backend-config/backend-secrets env first.
apiVersion: batch/v1
kind: Job
metadata:
  name: k8s-llm-job-wk-REPLACE_JOB_ID
  labels:
    app: k8s-llm-job
    job-template: worker-tabular
    job-id: REPLACE_JOB_ID
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: k8s-llm-job
        job-template: worker-tabular
        job-id: REPLACE_JOB_ID
    spec:
      restartPolicy: Never
      containers:
        - name: worker
          image: k8s-llm-job-worker-tabular:local
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "workers.tabular.main"]
          env:
            - name: JOB_ID
              value: REPLACE_JOB_ID
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
