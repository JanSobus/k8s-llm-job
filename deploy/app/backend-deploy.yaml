apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: default
data:
  APP_LLM_PROVIDER: "openai"
  APP_LLM_FAKE_MODE: "false"
  APP_OPENAI_BASE_URL: "https://api.openai.com/v1"
  APP_OPENAI_MODEL: "gpt-4o-mini"
  APP_MINIO_ENDPOINT: "http://minio.default.svc.cluster.local:9000"
  APP_MINIO_BUCKET: "cern-ml-demo"
  APP_MINIO_SECURE: "false"
  APP_JOB_EXECUTION_MODE: "kubernetes"
  APP_BACKEND_KUBERNETES_IN_CLUSTER: "true"
  APP_KUBERNETES_NAMESPACE: "default"
  APP_WORKER_IMAGE_PDF: "cern-ml-demo-worker-pdf:local"
  APP_WORKER_IMAGE_TABULAR: "cern-ml-demo-worker-tabular:local"
  APP_JOB_TTL_SECONDS_AFTER_FINISHED: "600"
---
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: default
type: Opaque
stringData:
  APP_OPENAI_API_KEY: ""
  APP_MINIO_ACCESS_KEY: "minioadmin"
  APP_MINIO_SECRET_KEY: "minioadmin"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cern-ml-demo-backend
  namespace: default
  labels:
    app: cern-ml-demo
    component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cern-ml-demo
      component: backend
  template:
    metadata:
      labels:
        app: cern-ml-demo
        component: backend
    spec:
      serviceAccountName: cern-ml-demo-backend
      containers:
        - name: backend
          image: cern-ml-demo-backend:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secrets
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: cern-ml-demo-backend
  namespace: default
  labels:
    app: cern-ml-demo
    component: backend
spec:
  type: NodePort
  selector:
    app: cern-ml-demo
    component: backend
  ports:
    - name: http
      port: 8000
      targetPort: http
      nodePort: 30800
