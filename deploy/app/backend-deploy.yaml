apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: default
data:
  APP_LLM_PROVIDER: "openai"
  APP_LLM_FAKE_MODE: "true"
  APP_OPENAI_BASE_URL: "https://api.openai.com/v1"
  APP_OPENAI_MODEL: "gpt-4o-mini"
  APP_KSERVE_BASE_URL: "http://vllm-predictor.default.svc.cluster.local/v1"
  APP_KSERVE_MODEL: "Qwen/Qwen2.5-0.5B-Instruct"
  APP_MINIO_ENDPOINT: "http://minio.default.svc.cluster.local:9000"
  APP_MINIO_BUCKET: "k8s-llm-job"
  APP_MINIO_SECURE: "false"
  APP_JOB_EXECUTION_MODE: "kubernetes"
  APP_BACKEND_KUBERNETES_IN_CLUSTER: "true"
  APP_KUBERNETES_NAMESPACE: "default"
  APP_WORKER_IMAGE_PDF: "k8s-llm-job-worker-pdf:local"
  APP_WORKER_IMAGE_TABULAR: "k8s-llm-job-worker-tabular:local"
  APP_JOB_TTL_SECONDS_AFTER_FINISHED: "600"
  APP_WORKER_POLL_TIMEOUT_SECONDS: "300"
  APP_GRAFANA_URL: "http://localhost:3000"
---
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: default
type: Opaque
stringData:
  APP_OPENAI_API_KEY: ""
  APP_MINIO_ACCESS_KEY: "minioadmin"
  APP_MINIO_SECRET_KEY: "minioadmin"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-llm-job-backend
  namespace: default
  labels:
    app: k8s-llm-job
    component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-llm-job
      component: backend
  template:
    metadata:
      labels:
        app: k8s-llm-job
        component: backend
    spec:
      serviceAccountName: k8s-llm-job-backend
      containers:
        - name: backend
          image: k8s-llm-job-backend:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secrets
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: k8s-llm-job-backend
  namespace: default
  labels:
    app: k8s-llm-job
    component: backend
spec:
  type: NodePort
  selector:
    app: k8s-llm-job
    component: backend
  ports:
    - name: http
      port: 8000
      targetPort: http
      nodePort: 30800
