# KServe InferenceService: vLLM serving Qwen2.5-0.5B-Instruct
#
# Profiles:
#   kserve-cpu  (default): CPU-only, small model, no GPU required.
#     Requires ~6 GB RAM and ~4 vCPUs.  Set APP_LLM_PROVIDER=kserve.
#
#   gpu-notes (documented, not required locally):
#     - Replace resources with nvidia.com/gpu: "1" limits
#     - Remove --dtype float32 / --device cpu below
#     - Use a larger model (e.g. Qwen/Qwen2.5-7B-Instruct)
#     - Add --tensor-parallel-size 2 for multi-GPU
#
# The backend reaches this endpoint at:
#   http://vllm-predictor.default.svc.cluster.local/v1
# (KServe RawDeployment mode names the predictor Service
# `<inferenceservice-name>-predictor`, so the InferenceService here is
# named `vllm` to keep the URL clean.)
# Set APP_KSERVE_BASE_URL to match.
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: vllm
  namespace: default
  annotations:
    # Raw-deployment mode: no Knative, no queue-proxy sidecar.
    serving.kserve.io/deploymentMode: RawDeployment
spec:
  predictor:
    minReplicas: 1
    maxReplicas: 3          # HPA target; KServe creates an HPA automatically
    scaleTarget: 70         # scale when average CPU utilization is above 70%
    scaleMetric: cpu
    containers:
      - name: kserve-container
        image: vllm/vllm-openai:v0.6.6
        command: ["python3", "-m", "vllm.entrypoints.openai.api_server"]
        args:
          - --model
          - Qwen/Qwen2.5-0.5B-Instruct
          - --served-model-name
          - Qwen/Qwen2.5-0.5B-Instruct
          - --port
          - "8080"
          - --dtype
          - float32          # CPU-safe; switch to auto on GPU nodes
          - --device
          - cpu              # remove on GPU nodes
          - --max-model-len
          - "2048"           # fits small models in CPU RAM
        ports:
          - containerPort: 8080
            protocol: TCP
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
          failureThreshold: 12
        resources:
          requests:
            cpu: "2"
            memory: 4Gi
          limits:
            cpu: "4"
            memory: 8Gi
