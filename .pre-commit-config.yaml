repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check .
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: pyright
        name: pyright
        entry: uv run pyright
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: pytest-coverage
        name: pytest with coverage
        entry: uv run pytest --tb=short -q
        language: system
        pass_filenames: false
        stages: [pre-push]
